<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FF6A00" />
  <title>Prospector · IABotz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/panel.css?v=18" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-lockup"><img src="/static/img/iabotz-icon.png" alt="IA Botz" /><div><p class="brand">Prospector</p><p class="muted small">by IA Botz</p></div></div>
      </div>
      <nav>
        <button data-view="overview" class="nav active">Funil</button>
        <button data-view="kanban" class="nav">Pipeline</button>
        <button data-view="prospect" class="nav">Prospectar</button>
        <button data-view="leads" class="nav">Leads</button>
        <button data-view="followups" class="nav">Follow-ups</button>
        <button data-view="emails" class="nav">Mensagens</button>
        <button data-view="outreach" class="nav">Outreach</button>
        <button data-view="jobs" class="nav">Jobs</button>
        <button data-view="config" class="nav">Config</button>
      </nav>
      <p class="sidebar-hint muted small">Maps → site → aaPanel → DNS → e-mail</p>
      <a class="logout" href="/logout">Sair</a>
    </aside>
    <main class="content">
      <header class="top">
        <div>
          <h1 id="view-title">Funil</h1>
          <p class="muted small" id="view-sub">Pipeline comercial</p>
        </div>
        <div id="engine-badge" class="badge">…</div>
      </header>
      <section id="view-overview" class="view"></section>
      <section id="view-kanban" class="view hidden"></section>
      <section id="view-prospect" class="view hidden"></section>
      <section id="view-leads" class="view hidden"></section>
      <section id="view-followups" class="view hidden"></section>
      <section id="view-emails" class="view hidden"></section>
      <section id="view-outreach" class="view hidden"></section>
      <section id="view-jobs" class="view hidden"></section>
      <section id="view-config" class="view hidden"></section>
    </main>
  </div>

  <div id="drawer" class="drawer hidden" aria-hidden="true">
    <div class="drawer-backdrop" data-close-drawer></div>
    <aside class="drawer-panel">
      <header class="drawer-head">
        <div>
          <p class="muted small" id="drawer-status">—</p>
          <h2 id="drawer-title">Lead</h2>
        </div>
        <button type="button" class="btn ghost sm" data-close-drawer>Fechar</button>
      </header>
      <div id="drawer-body" class="drawer-body"></div>
      <footer id="drawer-actions" class="drawer-actions"></footer>
    </aside>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/static/js/panel.js?v=17"></script>
</body>
</html>
